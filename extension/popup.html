<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pose</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="app-header">
        <div class="brand-copy">
          <h1>Dressing room</h1>
        </div>
      </header>

      <section class="panel">
        <div class="section-head">
          <div>
            <h2>Your photos</h2>
            <p>Choose the photo Pose should use.</p>
          </div>
          <span id="referenceCount">0</span>
        </div>
        <input id="referenceInput" class="visually-hidden" type="file" accept="image/*" multiple />
        <div id="referenceGrid" class="reference-grid"></div>
        <div class="upload-row">
          <label class="upload-button" for="referenceInput">Add photos</label>
          <button id="clearRefsBtn" type="button" class="text-button">Clear all</button>
        </div>

        <button id="generateBtn" type="button" class="primary main-action">Try on visible photos</button>
      </section>

      <section class="panel settings-panel">
        <label class="toggle">
          <span>
            <strong>Show my try-ons</strong>
            <small>Switch store photos to your saved looks.</small>
          </span>
          <input id="showTryOns" type="checkbox" />
        </label>
        <label class="toggle">
          <span>
            <strong>Show try-on buttons</strong>
            <small>Show a Try on button over product photos.</small>
          </span>
          <input id="showTags" type="checkbox" />
        </label>
      </section>

      <div class="action-grid">
        <button id="scanBtn" type="button">Find photos</button>
        <button id="roomBtn" type="button" class="secondary">Saved looks</button>
      </div>

      <details class="advanced">
        <summary>Menu</summary>
        <label class="field">
          <span>Local server</span>
          <input id="serverUrl" type="url" value="http://localhost:8787" />
        </label>
      </details>

      <p id="message" class="message"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
