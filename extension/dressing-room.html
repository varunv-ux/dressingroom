<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dressing room</title>
    <link rel="stylesheet" href="dressing-room.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <img class="brand-logo" src="icons/icon-32.png" alt="" />
        <strong>Dressing room</strong>
      </div>
    </header>

    <nav id="filters"></nav>

    <main>
      <section id="grid" class="grid" aria-label="Looks"></section>
    </main>

    <div id="selectionAction" class="selection-action" hidden>
      <span id="selectionCount"></span>
      <button id="createStackButton" type="button">Create stack</button>
    </div>

    <section id="stackLayer" class="stack-layer" aria-label="Stack" hidden>
      <div class="stack-layer-header">
        <button id="closeStackButton" class="icon-button" type="button" aria-label="Close stack"></button>
        <div>
          <strong id="stackTitle">Stack</strong>
          <span id="stackCount"></span>
        </div>
        <button id="unstackButton" type="button">Unstack</button>
      </div>
      <section id="stackGrid" class="stack-grid"></section>
    </section>

    <template id="lookTemplate">
      <div class="look-item">
        <article class="look-card">
          <img />
          <div class="look-meta">
            <span class="domain"></span>
            <div class="look-actions">
              <button class="icon-button move-button" type="button"></button>
              <button class="icon-button hide-button" type="button" aria-label="Hide look"></button>
              <a class="icon-button open-button" target="_blank" rel="noreferrer"></a>
            </div>
          </div>
        </article>
      </div>
    </template>

    <script src="vendor/muuri.min.js"></script>
    <script src="vendor/viselect.umd.js"></script>
    <script src="dressing-room.js"></script>
  </body>
</html>
